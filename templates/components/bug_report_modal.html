<!-- templates/components/bug_report_modal.html
     Shared bug report modal form. Included via Jinja include on any page
     that needs the bug report icon + modal. Captures reporter info,
     bug description with image paste support, and file upload with
     client-side auto-resize. -->


<!--===================================================================
     Bug Report Modal
     =================================================================== -->
<div class="modal-overlay" id="bug-report-modal-overlay">
    <div class="modal-dialog bug-report-modal-dialog">
        <div class="modal-dialog-header">
            <span class="modal-dialog-title">Report a Bug</span>
            <button class="modal-dialog-close" id="close-bug-report-modal"
                    aria-label="Close">&times;</button>
        </div>
        <div class="modal-dialog-body">
            <form id="bug-report-form" novalidate>

                <!-- First name (required; will auto-fill from login later) -->
                <div class="form-field">
                    <label class="form-label" for="bug-first-name">
                        First name <span class="required-asterisk">*</span>
                    </label>
                    <input type="text" id="bug-first-name"
                           class="form-input" required>
                </div>

                <!-- Last name (will auto-fill from login later) -->
                <div class="form-field">
                    <label class="form-label" for="bug-last-name">
                        Last name
                    </label>
                    <input type="text" id="bug-last-name"
                           class="form-input">
                </div>

                <!-- Email (required; will auto-fill from login later) -->
                <div class="form-field">
                    <label class="form-label" for="bug-email">
                        Email <span class="required-asterisk">*</span>
                    </label>
                    <input type="email" id="bug-email"
                           class="form-input" required>
                </div>

                <!-- Bug description (required) -->
                <div class="form-field">
                    <label class="form-label" for="bug-description">
                        Explain the bug you experienced <span class="required-asterisk">*</span>
                    </label>
                    <textarea id="bug-description"
                              class="form-textarea" rows="5"
                              required
                              placeholder="Describe the bug you experienced. You can paste screenshots directly into this field."></textarea>
                </div>

                <!-- Image preview area (populated by paste or file upload) -->
                <div class="bug-image-preview-area" id="bug-image-preview-area">
                    <!-- Thumbnails inserted here by JS -->
                </div>

                <!-- Image upload -->
                <div class="form-field">
                    <label class="form-label">
                        Upload a screenshot (optional)
                    </label>
                    <div class="bug-upload-area" id="bug-upload-area">
                        <input type="file" id="bug-image-input"
                               accept="image/jpeg,image/png,image/gif,image/webp"
                               multiple
                               class="bug-file-input">
                        <label for="bug-image-input" class="bug-upload-label">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Choose files or drag and drop</span>
                        </label>
                    </div>
                    <p class="bug-upload-hint">Max 3 images. Large images are automatically resized.</p>
                </div>

                <div class="form-actions">
                    <button type="button" class="button-secondary"
                            id="cancel-bug-report">Cancel</button>
                    <button type="submit" class="button">Submit Bug Report</button>
                </div>
            </form>
        </div>
    </div>
</div>
